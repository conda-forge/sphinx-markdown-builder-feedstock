{% set name = "sphinx-markdown-builder" %}
{% set version = "0.6.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/sphinx_markdown_builder-{{ version }}.tar.gz
  sha256: cd5acf88d52ea0146a712fd557404f10326dff3428a78ba928e59b1727fd4a86

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0.0
    - wheel
    - poetry-core
    - pip
  run:
    - python >={{ python_min }}
    - sphinx >=5.1.0
    - tabulate
    - docutils

test:
  imports:
    - sphinx_markdown_builder
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: A Sphinx extension to add markdown generation support.
  home: https://github.com/liran-funaro/sphinx-markdown-builder
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - raispbizerra
    - igortg
    - LucasRochaAbraao
    - jan-janssen
